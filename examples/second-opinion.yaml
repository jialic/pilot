steps:
  - action: read_var
    vars:
      - name: question
        arg: question
      - name: model
        arg: model
  - action: select
    mode: all
    prepare_input_for_body: "SELECT CAST(extract(epoch FROM now()) * 1000 AS BIGINT) AS ts, 'user' AS role, value AS content FROM input WHERE name = 'question'"
    branches:
      - name: gpt
        when: "SELECT COUNT(*) > 0 AS output FROM input WHERE name = 'model' AND value = 'openai/gpt-5-mini'"
        body:
          - action: llm
            model: openai/gpt-5-mini
            prompt: Answer the user's question thoughtfully and concisely.
            post_output_sql: "SELECT 'gpt-5-mini' AS name, content AS output FROM input WHERE role = 'assistant' ORDER BY ts DESC LIMIT 1"
      - name: claude
        when: "SELECT COUNT(*) > 0 AS output FROM input WHERE name = 'model' AND value = 'anthropic/claude-haiku-4-5'"
        body:
          - action: llm
            model: anthropic/claude-haiku-4-5
            prompt: Answer the user's question thoughtfully and concisely.
            post_output_sql: "SELECT 'claude-haiku' AS name, content AS output FROM input WHERE role = 'assistant' ORDER BY ts DESC LIMIT 1"

# Usage:
#   pilot run second-opinion --question "your question" --model openai/gpt-5-mini --model anthropic/claude-haiku-4-5
#
# Add more branches for additional models. See `pilot help models` for supported models.
